services:
  - type: web
    name: ml-explorer-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python generate_samples.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
